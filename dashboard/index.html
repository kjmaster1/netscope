<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>netscope</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #0d1117;
            border-bottom: 1px solid #1e2d3d;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #38bdf8;
            letter-spacing: 2px;
        }

        .logo span { color: #64748b; }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }

        .status-dot.connected { background: #22c55e; }

        /* ── Stats bar ── */
        .stats-bar {
            display: flex;
            gap: 1px;
            background: #1e2d3d;
            flex-shrink: 0;
        }

        .stat {
            flex: 1;
            padding: 10px 16px;
            background: #0d1117;
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ── Main layout ── */
        .main {
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 200px 1fr;
            gap: 1px;
            background: #1e2d3d;
            flex: 1;
            overflow: hidden;
        }

        /* ── Chart area ── */
        .chart-area {
            background: #0d1117;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        canvas {
            flex: 1;
            width: 100%;
        }

        /* ── Protocol breakdown ── */
        .protocol-panel {
            background: #0d1117;
            padding: 16px;
            grid-row: 1 / 3;
        }

        .proto-bar {
            margin-bottom: 12px;
        }

        .proto-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .proto-name { color: #e2e8f0; }
        .proto-count { color: #64748b; }

        .proto-track {
            height: 4px;
            background: #1e2d3d;
            border-radius: 2px;
            overflow: hidden;
        }

        .proto-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .fill-tcp  { background: #38bdf8; }
        .fill-udp  { background: #a78bfa; }
        .fill-icmp { background: #fb923c; }
        .fill-other{ background: #64748b; }

        /* ── Packet feed ── */
        .packet-feed {
            background: #0d1117;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .feed-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #1e2d3d transparent;
        }

        .packet-row {
            display: grid;
            grid-template-columns: 50px 70px 160px 20px 160px 60px 80px;
            gap: 8px;
            padding: 3px 0;
            border-bottom: 1px solid #0a0e1a;
            font-size: 0.72rem;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-4px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .packet-row:hover { background: #0f172a; }

        .col-num   { color: #334155; }
        .col-proto { font-weight: bold; }
        .col-tcp   { color: #38bdf8; }
        .col-udp   { color: #a78bfa; }
        .col-icmp  { color: #fb923c; }
        .col-other { color: #64748b; }
        .col-ip    { color: #94a3b8; }
        .col-arrow { color: #334155; text-align: center; }
        .col-bytes { color: #64748b; text-align: right; }
        .col-svc   {
            color: #22c55e;
            font-size: 0.65rem;
            background: #052e16;
            padding: 1px 4px;
            border-radius: 2px;
            text-align: center;
        }

        .feed-header {
            display: grid;
            grid-template-columns: 50px 70px 160px 20px 160px 60px 80px;
            gap: 8px;
            padding: 0 0 6px 0;
            border-bottom: 1px solid #1e2d3d;
            font-size: 0.65rem;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">net<span>scope</span></div>
    <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>
</header>

<div class="stats-bar">
    <div class="stat">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total Packets</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="statRate">0</div>
        <div class="stat-label">Packets / sec</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="statBytes">0</div>
        <div class="stat-label">KB / sec</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="statTCP">0</div>
        <div class="stat-label">TCP</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="statUDP">0</div>
        <div class="stat-label">UDP</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="statHosts">0</div>
        <div class="stat-label">Unique Hosts</div>
    </div>
</div>

<div class="main">

    <!-- Bandwidth chart -->
    <div class="chart-area">
        <div class="panel-title">Bandwidth (bytes/sec)</div>
        <canvas id="bwChart"></canvas>
    </div>

    <!-- Protocol breakdown -->
    <div class="protocol-panel">
        <div class="panel-title">Protocol Breakdown</div>
        <div class="proto-bar">
            <div class="proto-header">
                <span class="proto-name">TCP</span>
                <span class="proto-count" id="pTCP">0</span>
            </div>
            <div class="proto-track">
                <div class="proto-fill fill-tcp"
                     id="bTCP" style="width:0%"></div>
            </div>
        </div>
        <div class="proto-bar">
            <div class="proto-header">
                <span class="proto-name">UDP</span>
                <span class="proto-count" id="pUDP">0</span>
            </div>
            <div class="proto-track">
                <div class="proto-fill fill-udp"
                     id="bUDP" style="width:0%"></div>
            </div>
        </div>
        <div class="proto-bar">
            <div class="proto-header">
                <span class="proto-name">ICMP</span>
                <span class="proto-count" id="pICMP">0</span>
            </div>
            <div class="proto-track">
                <div class="proto-fill fill-icmp"
                     id="bICMP" style="width:0%"></div>
            </div>
        </div>
        <div class="proto-bar">
            <div class="proto-header">
                <span class="proto-name">Other</span>
                <span class="proto-count" id="pOTHER">0</span>
            </div>
            <div class="proto-track">
                <div class="proto-fill fill-other"
                     id="bOTHER" style="width:0%"></div>
            </div>
        </div>

        <div class="panel-title" style="margin-top:24px">
            Top Connections
        </div>
        <div id="topConns" style="font-size:0.7rem;color:#64748b">
            Waiting for traffic...
        </div>
    </div>

    <!-- Live packet feed -->
    <div class="packet-feed">
        <div class="panel-title">Live Packet Feed</div>
        <div class="feed-header">
            <span>#</span>
            <span>Proto</span>
            <span>Source</span>
            <span></span>
            <span>Destination</span>
            <span>Service</span>
            <span style="text-align:right">Bytes</span>
        </div>
        <div class="feed-scroll" id="feed"></div>
    </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const MAX_FEED_ROWS  = 200;
const CHART_POINTS   = 60;

let packetCount  = 0;
let totalBytes   = 0;
let protos       = { TCP: 0, UDP: 0, ICMP: 0, OTHER: 0 };
let hosts        = new Set();
let connections  = {};
let bwHistory    = new Array(CHART_POINTS).fill(0);
let bytesThisSec = 0;
let pktsThisSec  = 0;

// ── WebSocket ──────────────────────────────────────────────────────────────
const dot  = document.getElementById('statusDot');
const text = document.getElementById('statusText');

function connect() {
    const ws = new WebSocket('ws://localhost:7681');

    ws.onopen = () => {
        dot.classList.add('connected');
        text.textContent = 'Live';
    };

    ws.onclose = () => {
        dot.classList.remove('connected');
        text.textContent = 'Reconnecting...';
        setTimeout(connect, 2000);
    };

    ws.onerror = () => {
        text.textContent = 'Error';
    };

    ws.onmessage = (e) => {
        const pkt = JSON.parse(e.data);
        handlePacket(pkt);
    };
}

// ── Packet handler ─────────────────────────────────────────────────────────
function handlePacket(pkt) {
    packetCount++;
    totalBytes   += pkt.length;
    bytesThisSec += pkt.length;
    pktsThisSec++;

    // Protocol counts
    const p = pkt.proto in protos ? pkt.proto : 'OTHER';
    protos[p]++;

    // Unique hosts
    hosts.add(pkt.src_ip);
    hosts.add(pkt.dst_ip);

    // Connection tracking
    const key = `${pkt.src_ip}:${pkt.src_port}->${pkt.dst_ip}:${pkt.dst_port}`;
    connections[key] = (connections[key] || 0) + 1;

    addFeedRow(pkt);
    updateStats();
    updateProtoBars();
    updateTopConns();
}

// ── Feed ───────────────────────────────────────────────────────────────────
const feed = document.getElementById('feed');

function addFeedRow(pkt) {
    const row = document.createElement('div');
    row.className = 'packet-row';

    const protoClass = {
        TCP: 'col-tcp', UDP: 'col-udp',
        ICMP: 'col-icmp'
    }[pkt.proto] || 'col-other';

    const src = pkt.src_port
        ? `${pkt.src_ip}:${pkt.src_port}`
        : pkt.src_ip;
    const dst = pkt.dst_port
        ? `${pkt.dst_ip}:${pkt.dst_port}`
        : pkt.dst_ip;

    row.innerHTML = `
        <span class="col-num">${packetCount}</span>
        <span class="col-proto ${protoClass}">${pkt.proto}</span>
        <span class="col-ip">${src}</span>
        <span class="col-arrow">→</span>
        <span class="col-ip">${dst}</span>
        <span class="col-svc">${pkt.service || ''}</span>
        <span class="col-bytes">${pkt.length}b</span>
    `;

    feed.insertBefore(row, feed.firstChild);

    // Keep feed bounded
    while (feed.children.length > MAX_FEED_ROWS) {
        feed.removeChild(feed.lastChild);
    }
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
    document.getElementById('statTotal').textContent =
        packetCount.toLocaleString();
    document.getElementById('statTCP').textContent =
        protos.TCP.toLocaleString();
    document.getElementById('statUDP').textContent =
        protos.UDP.toLocaleString();
    document.getElementById('statHosts').textContent =
        hosts.size;
}

// ── Protocol bars ──────────────────────────────────────────────────────────
function updateProtoBars() {
    const total = Object.values(protos).reduce((a, b) => a + b, 0);
    if (total === 0) return;

    for (const [name, count] of Object.entries(protos)) {
        const pct = ((count / total) * 100).toFixed(1);
        const el = document.getElementById(`p${name}`);
        const bar = document.getElementById(`b${name}`);
        if (el) el.textContent = count.toLocaleString();
        if (bar) bar.style.width = pct + '%';
    }
}

// ── Top connections ────────────────────────────────────────────────────────
function updateTopConns() {
    const sorted = Object.entries(connections)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

    const container = document.getElementById('topConns');
    container.innerHTML = sorted.map(([key, count]) =>
        `<div style="margin-bottom:6px;padding:4px;
                     background:#0a0e1a;border-radius:3px">
            <div style="color:#94a3b8;word-break:break-all;
                        font-size:0.65rem">${key}</div>
            <div style="color:#38bdf8;font-size:0.7rem">
                ${count} packets</div>
         </div>`
    ).join('');
}

// ── Bandwidth chart ────────────────────────────────────────────────────────
const canvas = document.getElementById('bwChart');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

function drawChart() {
    resizeCanvas();
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const max = Math.max(...bwHistory, 1);
    const step = w / (CHART_POINTS - 1);

    // Grid lines
    ctx.strokeStyle = '#1e2d3d';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = h - (i / 4) * h;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }

    // Fill area
    ctx.beginPath();
    ctx.moveTo(0, h);
    bwHistory.forEach((v, i) => {
        const x = i * step;
        const y = h - (v / max) * h * 0.9;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(w, h);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(56,189,248,0.3)');
    grad.addColorStop(1, 'rgba(56,189,248,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth = 2;
    bwHistory.forEach((v, i) => {
        const x = i * step;
        const y = h - (v / max) * h * 0.9;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
}

// ── 1-second tick ──────────────────────────────────────────────────────────
setInterval(() => {
    bwHistory.push(bytesThisSec);
    if (bwHistory.length > CHART_POINTS) bwHistory.shift();

    document.getElementById('statRate').textContent =
        pktsThisSec.toLocaleString();
    document.getElementById('statBytes').textContent =
        (bytesThisSec / 1024).toFixed(1);

    bytesThisSec = 0;
    pktsThisSec  = 0;

    drawChart();
}, 1000);

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', drawChart);
connect();
</script>
</body>
</html>
